name: Release MajorWarehause

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = '${{ github.event.inputs.version }}'
          if ([string]::IsNullOrWhiteSpace($version)) {
              $version = '${{ github.ref_name }}'
          }

          if ($version.StartsWith('v')) {
              $version = $version.Substring(1)
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
              throw 'Release version is empty.'
          }

          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build desktop package and setup
        shell: pwsh
        env:
          MAJORWAREHAUSE_APPSETTINGS_LOCAL_JSON: ${{ secrets.MAJORWAREHAUSE_APPSETTINGS_LOCAL_JSON }}
          MAJORWAREHAUSE_CODESIGN_PFX_BASE64: ${{ secrets.MAJORWAREHAUSE_CODESIGN_PFX_BASE64 }}
          MAJORWAREHAUSE_CODESIGN_PFX_PASSWORD: ${{ secrets.MAJORWAREHAUSE_CODESIGN_PFX_PASSWORD }}
          MAJORWAREHAUSE_CODESIGN_TIMESTAMP_SERVER: ${{ vars.MAJORWAREHAUSE_CODESIGN_TIMESTAMP_SERVER }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:MAJORWAREHAUSE_APPSETTINGS_LOCAL_JSON)) {
              throw 'Secret MAJORWAREHAUSE_APPSETTINGS_LOCAL_JSON is required for production releases.'
          }

          $releaseSettings = $env:MAJORWAREHAUSE_APPSETTINGS_LOCAL_JSON | ConvertFrom-Json
          if ($null -eq $releaseSettings.RemoteDatabase) {
              throw 'Secret MAJORWAREHAUSE_APPSETTINGS_LOCAL_JSON must contain RemoteDatabase settings.'
          }

          $remoteDatabase = $releaseSettings.RemoteDatabase
          if ([string]::IsNullOrWhiteSpace($remoteDatabase.Host) -or $remoteDatabase.Host -ieq 'db.example.com') {
              throw 'RemoteDatabase.Host is not configured for production release.'
          }
          if ([string]::IsNullOrWhiteSpace($remoteDatabase.Database)) {
              throw 'RemoteDatabase.Database is not configured for production release.'
          }
          if ([string]::IsNullOrWhiteSpace($remoteDatabase.User) -or $remoteDatabase.User -ieq 'warehouse_app') {
              throw 'RemoteDatabase.User is not configured for production release.'
          }
          if ([string]::IsNullOrWhiteSpace($remoteDatabase.Password) -or $remoteDatabase.Password -ieq 'change-me' -or $remoteDatabase.Password -ieq 'configured-by-release-secret') {
              throw 'RemoteDatabase.Password is not configured for production release.'
          }

          $localSettingsPath = Join-Path $PWD 'WarehouseAutomatisaion.Desktop.Wpf\appsettings.local.json'
          [IO.File]::WriteAllText(
              $localSettingsPath,
              $env:MAJORWAREHAUSE_APPSETTINGS_LOCAL_JSON,
              [Text.UTF8Encoding]::new($false))

          $appSettingsPath = Join-Path $PWD 'WarehouseAutomatisaion.Desktop.Wpf\appsettings.json'
          $appSettings = Get-Content -Raw -Path $appSettingsPath | ConvertFrom-Json
          $appSettings.RemoteDatabase = $releaseSettings.RemoteDatabase
          $appSettings | ConvertTo-Json -Depth 16 | Set-Content -Path $appSettingsPath -Encoding utf8NoBOM

          $buildArguments = @(
              '-ExecutionPolicy'
              'Bypass'
              '-File'
              '.\scripts\build-majorwarehause-setup.ps1'
              '-Version'
              '${{ steps.version.outputs.value }}'
          )

          if (-not [string]::IsNullOrWhiteSpace($env:MAJORWAREHAUSE_CODESIGN_PFX_BASE64)) {
              $certificatePath = Join-Path $env:RUNNER_TEMP 'majorwarehause-codesign.pfx'
              [IO.File]::WriteAllBytes(
                  $certificatePath,
                  [Convert]::FromBase64String($env:MAJORWAREHAUSE_CODESIGN_PFX_BASE64))

              $buildArguments += @('-CodeSigningCertificatePath', $certificatePath)
              $buildArguments += @('-CodeSigningCertificatePassword', $env:MAJORWAREHAUSE_CODESIGN_PFX_PASSWORD)
          }

          if (-not [string]::IsNullOrWhiteSpace($env:MAJORWAREHAUSE_CODESIGN_TIMESTAMP_SERVER)) {
              $buildArguments += @('-CodeSigningTimestampServer', $env:MAJORWAREHAUSE_CODESIGN_TIMESTAMP_SERVER)
          }

          powershell @buildArguments

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = '${{ steps.version.outputs.value }}'
          $tag = "v$version"
          $assetPaths = @(
              '.\artifacts\installers\MajorWarehauseSetup.exe',
              '.\artifacts\publish\majorwarehause-win-x64.zip'
          )
          $title = "MajorWarehause v$version"

          gh release view $tag 1>$null 2>$null
          if ($LASTEXITCODE -eq 0) {
              gh release upload $tag $assetPaths --clobber
              exit $LASTEXITCODE
          }

          gh release create $tag $assetPaths --title $title --notes "Desktop release for MajorWarehause $version."
